services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - feedlyra_pgdata:/var/lib/postgresql/data
    networks:
      - feedlyra-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    # No host port mapping: only reachable inside feedlyra-net.

  backend:
    image: ghcr.io/maplumex/feedlyra-backend:latest
    env_file:
      - .env
    environment:
      # Ensure the container path (mounted volume) regardless of any .env value.
      UPLOAD_DIR: /app/uploads/chat_images
    volumes:
      - feedlyra_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - feedlyra-net
    healthcheck:
      # python stdlib probe — works on the slim uv base image without curl.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    # No host port mapping: traffic enters via the frontend (nginx) reverse proxy.

  frontend:
    image: ghcr.io/maplumex/feedlyra-frontend:latest
    ports:
      - "${FRONTEND_PORT:-7756}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - feedlyra-net
    restart: unless-stopped

volumes:
  feedlyra_pgdata:
  feedlyra_uploads:

networks:
  feedlyra-net:
    driver: bridge
