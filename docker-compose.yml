services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - feedlyra_pgdata:/var/lib/postgresql/data
    networks:
      - feedlyra-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    # No host port mapping: only reachable inside feedlyra-net.

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      # Ensure the container path (mounted volume) regardless of any .env value.
      UPLOAD_DIR: /app/uploads/chat_images
    volumes:
      - feedlyra_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - feedlyra-net
    restart: unless-stopped
    # No host port mapping: traffic enters via the frontend (nginx) reverse proxy.

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - feedlyra-net
    restart: unless-stopped

volumes:
  feedlyra_pgdata:
  feedlyra_uploads:

networks:
  feedlyra-net:
    driver: bridge
