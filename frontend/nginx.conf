server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API + uploaded images served by the backend (preserve /api prefix).
    # proxy_pass has no trailing slash so the /api/... path forwards unchanged.
    location /api/ {
        proxy_pass http://backend:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: never buffer, allow long-running AI chat streams (default 60s would cut them).
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA fallback: serve static assets, fall back to index.html for client routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
